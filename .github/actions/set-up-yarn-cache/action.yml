# See https://github.com/yarnpkg/berry/discussions/2621#discussioncomment-505872.

name: Set up yarn cache
description: >
  Sets up caching for `yarn install` steps.
  Caches yarn's cache directory, install state, and node_modules.
  Caching the cache directory avoids yarn's fetch step and caching node_modules avoids yarn's link step.

runs:
  using: composite

  steps:
    - name: 📁 Get yarn's cache directory
      id: get-yarn-cache-directory
      run: echo "CACHE_DIRECTORY=$(yarn config get cacheFolder)" >> $GITHUB_OUTPUT
      shell: bash

    - name: ♻️ Cache yarn's cache
      uses: actions/cache@v5
      with:
        path: ${{ steps.get-yarn-cache-directory.outputs.CACHE_DIRECTORY }}
        key: yarn-cache-${{ runner.os }}-${{ github.run_id }}
        restore-keys: |
          yarn-cache-${{ runner.os }}-

    - name: ♻️ Cache yarn's install state
      uses: actions/cache@v5
      with:
        path: .yarn/install-state.gz
        key: yarn-install-state-${{ runner.os }}-${{ hashFiles('package.json', 'yarn.lock', '.yarnrc.yml') }}-${{ github.run_id }}
        restore-keys: |
          yarn-install-state-${{ runner.os }}-${{ hashFiles('package.json', 'yarn.lock', '.yarnrc.yml') }}-

    - name: ♻️ Cache node_modules
      uses: actions/cache@v5
      with:
        path: node_modules
        key: node-modules-${{ runner.os }}-${{ hashFiles('package.json', 'yarn.lock', '.yarnrc.yml') }}
        restore-keys: |
          node-modules-${{ runner.os }}-

    - name: ♻️ Cache create-cedar-rsc-app node_modules
      uses: actions/cache@v5
      with:
        path: packages/create-cedar-rsc-app/node_modules
        key: node-modules-create-cedar-rsc-app-${{ runner.os }}-${{ hashFiles('packages/create-cedar-rsc-app/yarn.lock', 'packages/create-cedar-rsc-app/package.json') }}
        restore-keys: |
          node-modules-create-cedar-rsc-app-${{ runner.os }}-
