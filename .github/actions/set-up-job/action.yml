name: Set up job
description: >
  Everything you need to run a job in CI.
  Enable corepack, set up Node.js, yarn install, and build.

inputs:
  node-version:
    description: >
      The version of Node.js to use.
    required: false
    default: '24'

  set-up-yarn-cache:
    description: >
      For some actions, setting up the yarn cache takes longer than it would to just yarn install.
    required: false
    default: 'true'

  yarn-install-directory:
    description: >
      The directory to run `yarn install` in.
    required: false

  build:
    description: >
      Whether or not to run `yarn build` to build all the framework packages.
    required: false
    default: 'true'

runs:
  using: composite

  steps:
    - name: ⬢ Enable Corepack
      shell: bash
      # Using --force to make this work on Windows
      run: npm install --global --force corepack

    - name: ⬢ Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}

    # We have to enable Corepack again for Windows. 🤷
    # In general, we're waiting on [this issue](https://github.com/actions/setup-node/issues/531)
    # to be resolved so that `actions/setup-node@v4` has first-class Corepack support.
    - name: ⬢ Enable Corepack
      if: runner.os == 'Windows'
      shell: bash
      # Using --force to make this work on Windows
      run: npm install --global --force corepack

    - name: 🐈 Set up yarn cache
      if: inputs.set-up-yarn-cache == 'true'
      id: set-up-yarn-cache
      uses: ./.github/actions/set-up-yarn-cache

    # One of our dependencies is on GitHub instead of NPM and without authentication
    # we'll get rate limited and this step becomes flaky.
    - name: 🐈 Yarn install
      shell: bash
      working-directory: ${{ inputs.yarn-install-directory }}
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: yarn install --inline-builds && yarn --cwd packages/create-cedar-rsc-app install --inline-builds

    - name: 💾 Save node_modules cache
      if: inputs.set-up-yarn-cache == 'true' && steps.set-up-yarn-cache.outputs.node-modules-cache-hit != 'true'
      uses: actions/cache/save@v5
      continue-on-error: true
      with:
        path: node_modules
        key: node-modules-${{ runner.os }}-${{ hashFiles('package.json', 'yarn.lock', '.yarnrc.yml') }}

    - name: 💾 Save create-cedar-rsc-app node_modules cache
      if: inputs.set-up-yarn-cache == 'true' && steps.set-up-yarn-cache.outputs.create-cedar-rsc-app-cache-hit != 'true'
      uses: actions/cache/save@v5
      continue-on-error: true
      with:
        path: packages/create-cedar-rsc-app/node_modules
        key: node-modules-create-cedar-rsc-app-${{ runner.os }}-${{ hashFiles('packages/create-cedar-rsc-app/yarn.lock', 'packages/create-cedar-rsc-app/package.json') }}

    - name: 🏗️ Build
      if: inputs.build == 'true'
      shell: bash
      run: |
        set -o pipefail
        yarn build || {
          echo "::group::package.json diagnostics"
          node $GITHUB_WORKSPACE/.github/scripts/diagnose-package-json.mjs || true
          echo "::endgroup::"
          exit 1
        }
