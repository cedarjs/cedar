name: ⚙️ CI

on:
  # Run on all pull requests
  pull_request: {}
  # Run on pushes to the 'next' branch and to release branches
  push:
    branches: ['next', 'release/**']

# Cancel in-progress runs of this workflow.
# See https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#example-only-cancel-in-progress-jobs-or-runs-for-the-current-workflow.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

env:
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
  YARN_ENABLE_HARDENED_MODE: 0

jobs:
  detect-changes:
    if: github.repository == 'cedarjs/cedar'
    name: 🔍 Detect changes
    runs-on: ubuntu-latest

    outputs:
      code: ${{ steps.detect-changes.outputs.code }}
      cli: ${{ steps.detect-changes.outputs.cli }}
      rsc: ${{ steps.detect-changes.outputs.rsc }}
      ssr: ${{ steps.detect-changes.outputs.ssr }}
      windows: ${{ steps.detect-changes.outputs.windows }}

    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - name: Set up job
        uses: ./.github/actions/set-up-job
        with:
          set-up-yarn-cache: false
          yarn-install-directory: ./.github/actions/detect-changes
          build: false

      - name: 🔍 Detect changes
        id: detect-changes
        uses: ./.github/actions/detect-changes

  # The job is not gated on the `code` output because the formatting check
  # also covers docs-only changes. The constraints step, however, is — so a
  # broken constraint can't block a docs-only PR.
  check:
    needs: detect-changes

    name: ✅ Check constraints, dependencies, formatting, and package.json's
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - name: Set up job
        uses: ./.github/actions/set-up-job
        with:
          set-up-yarn-cache: false
          yarn-install-directory: .
          build: false

      - name: 📝 Check formatting (prettier)
        run: yarn format:check

      - name: ✅ Check constraints, dependencies, and package.json's
        if: needs.detect-changes.outputs.code == 'true'
        run: yarn check

  build-lint-test:
    needs: detect-changes
    if: needs.detect-changes.outputs.code == 'true'

    strategy:
      matrix:
        # windows-latest is only included when detect-changes deems the diff
        # Windows-relevant (see cases/windows.mts) or the PR has the `windows`
        # label. The nightly-windows workflow covers anything that slips by.
        os: ${{ needs.detect-changes.outputs.windows == 'true' && fromJSON('["ubuntu-latest", "windows-latest"]') || fromJSON('["ubuntu-latest"]') }}

    name: 🏗 Build, lint, test / ${{ matrix.os }} / node 24 latest
    uses: ./.github/workflows/build-lint-test.yml
    with:
      os: ${{ matrix.os }}

  # Runs the server tests, the Ubuntu telemetry check, and the tutorial E2E
  # in a single job to save setup time and runner queue slots. The Windows
  # telemetry check still runs in the telemetry-check job below.
  consolidated-tests:
    needs: detect-changes
    if: needs.detect-changes.outputs.code == 'true'
    name: 🧪 Consolidated tests (server, telemetry, tutorial E2E) / node 24 latest
    uses: ./.github/workflows/consolidated-tests.yml

  smoke-tests:
    needs: detect-changes
    if: needs.detect-changes.outputs.code == 'true'

    strategy:
      matrix:
        # windows-latest is only included when detect-changes deems the diff
        # Windows-relevant (see cases/windows.mts) or the PR has the `windows`
        # label. The nightly-windows workflow covers anything that slips by.
        os: ${{ needs.detect-changes.outputs.windows == 'true' && fromJSON('["ubuntu-latest", "windows-latest"]') || fromJSON('["ubuntu-latest"]') }}

    name: 🔄 Smoke tests / ${{ matrix.os }} / node 24 latest
    uses: ./.github/workflows/smoke-tests-test.yml
    with:
      os: ${{ matrix.os }}

  smoke-tests-react-18:
    needs: detect-changes
    if: needs.detect-changes.outputs.code == 'true'

    strategy:
      matrix:
        # windows-latest is only included when detect-changes deems the diff
        # Windows-relevant (see cases/windows.mts) or the PR has the `windows`
        # label. The nightly-windows workflow covers anything that slips by.
        os: ${{ needs.detect-changes.outputs.windows == 'true' && fromJSON('["ubuntu-latest", "windows-latest"]') || fromJSON('["ubuntu-latest"]') }}

    name: 🔄 Smoke tests React 18 / ${{ matrix.os }} / node 24 latest
    uses: ./.github/workflows/smoke-tests-react-18-test.yml
    with:
      os: ${{ matrix.os }}

  smoke-tests-esm:
    needs: detect-changes
    if: needs.detect-changes.outputs.code == 'true'

    strategy:
      matrix:
        # windows-latest is only included when detect-changes deems the diff
        # Windows-relevant (see cases/windows.mts) or the PR has the `windows`
        # label. The nightly-windows workflow covers anything that slips by.
        os: ${{ needs.detect-changes.outputs.windows == 'true' && fromJSON('["ubuntu-latest", "windows-latest"]') || fromJSON('["ubuntu-latest"]') }}

    name: 🔄 Smoke tests ESM / ${{ matrix.os }} / node 24 latest
    uses: ./.github/workflows/smoke-tests-test-esm.yml
    with:
      os: ${{ matrix.os }}

  cli-smoke-tests:
    needs: detect-changes
    if: needs.detect-changes.outputs.code == 'true'

    strategy:
      matrix:
        # windows-latest is only included when detect-changes deems the diff
        # Windows-relevant (see cases/windows.mts) or the PR has the `windows`
        # label. The nightly-windows workflow covers anything that slips by.
        os: ${{ needs.detect-changes.outputs.windows == 'true' && fromJSON('["ubuntu-latest", "windows-latest"]') || fromJSON('["ubuntu-latest"]') }}

    name: 🔄 CLI smoke tests / ${{ matrix.os }} / node 24 latest
    uses: ./.github/workflows/cli-smoke-tests.yml
    with:
      os: ${{ matrix.os }}

  telemetry-check:
    needs: detect-changes

    # When releasing a new version of Cedar this check would try to install
    # @cedar/* package versions that aren't published yet, so it would always
    # fail. That's why we skip it on release branches.
    if: >-
      needs.detect-changes.outputs.code == 'true' &&
      needs.detect-changes.outputs.windows == 'true' &&
      (github.event_name == 'pull_request' || !startsWith(github.ref, 'refs/heads/release/'))

    strategy:
      matrix:
        # The Ubuntu telemetry check runs as part of the consolidated-tests
        # job.
        os: [windows-latest]

    name: 🔭 Telemetry check / ${{ matrix.os }} / node 24 latest
    uses: ./.github/workflows/telemetry-check.yml
    with:
      os: ${{ matrix.os }}

  rsc-smoke-tests:
    needs: detect-changes
    if: needs.detect-changes.outputs.rsc == 'true'

    strategy:
      matrix:
        # windows-latest is only included when detect-changes deems the diff
        # Windows-relevant (see cases/windows.mts) or the PR has the `windows`
        # label. The nightly-windows workflow covers anything that slips by.
        os: ${{ needs.detect-changes.outputs.windows == 'true' && fromJSON('["ubuntu-latest", "windows-latest"]') || fromJSON('["ubuntu-latest"]') }}

    name: 🔄🐘 RSC Smoke tests / ${{ matrix.os }}
    uses: ./.github/workflows/rsc-smoke-tests.yml
    with:
      os: ${{ matrix.os }}

  ssr-smoke-tests:
    needs: detect-changes
    if: needs.detect-changes.outputs.ssr == 'true'

    strategy:
      matrix:
        # TODO: add `windows-latest`.
        os: [ubuntu-latest]

    name: 🔁 SSR Smoke tests / ${{ matrix.os }}
    uses: ./.github/workflows/ssr-smoke-tests.yml
    with:
      os: ${{ matrix.os }}

  fragments-smoke-tests:
    needs: detect-changes
    if: needs.detect-changes.outputs.code == 'true'

    strategy:
      matrix:
        # windows-latest is only included when detect-changes deems the diff
        # Windows-relevant (see cases/windows.mts) or the PR has the `windows`
        # label. The nightly-windows workflow covers anything that slips by.
        os: ${{ needs.detect-changes.outputs.windows == 'true' && fromJSON('["ubuntu-latest", "windows-latest"]') || fromJSON('["ubuntu-latest"]') }}

    name: 📄 Fragments Smoke tests / ${{ matrix.os }}
    uses: ./.github/workflows/fragments-smoke-tests.yml
    with:
      os: ${{ matrix.os }}

  live-smoke-tests:
    needs: detect-changes
    if: needs.detect-changes.outputs.code == 'true'

    strategy:
      matrix:
        os: [ubuntu-latest]

    name: 🔄 Live Smoke tests / ${{ matrix.os }}
    uses: ./.github/workflows/live-smoke-tests.yml
    with:
      os: ${{ matrix.os }}

  create-cedar-app:
    needs: detect-changes

    # When releasing a new version of Cedar this check would try to install
    # @cedar/* package versions that aren't published yet, so it would always
    # fail. That's why we skip it on release branches.
    if: >-
      needs.detect-changes.outputs.code == 'true' &&
      (github.event_name == 'pull_request' || !startsWith(github.ref, 'refs/heads/release/'))
    name: 🌲 Create Cedar App
    uses: ./.github/workflows/create-cedar-app-test.yml

  cli-pm-smoke-tests:
    needs: detect-changes
    # This job is skipped for now because it's constantly failing and blocking
    # PRs not related to pm agnostic work.
    # TODO: Re-enable this job once the issue is resolved
    if: false

    strategy:
      matrix:
        # Single OS here just for GitHub to create a single "skipped" job entry
        # that `ci-status-check` can see. Without this `ci-status-check` would
        # not pass for PRs with no cli-related changes
        os: [ubuntu-latest]

    name: 🔄 CLI PM smoke tests / ${{ matrix.os }}
    uses: ./.github/workflows/package-manager-smoke-tests.yml

  ud-tests:
    needs: detect-changes
    if: needs.detect-changes.outputs.code == 'true'
    name: Universal Deploy tests
    uses: ./.github/workflows/ud-tests.yml

  background-jobs-e2e:
    needs: detect-changes
    if: needs.detect-changes.outputs.code == 'true'

    strategy:
      matrix:
        # windows-latest is only included when detect-changes deems the diff
        # Windows-relevant (see cases/windows.mts) or the PR has the `windows`
        # label. The nightly-windows workflow covers anything that slips by.
        os: ${{ needs.detect-changes.outputs.windows == 'true' && fromJSON('["ubuntu-latest", "windows-latest"]') || fromJSON('["ubuntu-latest"]') }}

    name: Background jobs E2E test / ${{ matrix.os }}
    uses: ./.github/workflows/background-jobs-e2e.yml
    with:
      os: ${{ matrix.os }}

  e2e-netlify:
    needs: detect-changes
    if: >-
      needs.detect-changes.outputs.code == 'true' &&
      github.repository == 'cedarjs/cedar' &&
      (github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork)
    name: 🔷 E2E Netlify deploy
    uses: ./.github/workflows/e2e-netlify.yml
    secrets: inherit

  e2e-vercel:
    needs: detect-changes
    if: >-
      needs.detect-changes.outputs.code == 'true' &&
      github.repository == 'cedarjs/cedar' &&
      (github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork)
    name: ▲ E2E Vercel deploy
    uses: ./.github/workflows/e2e-vercel.yml
    secrets: inherit

  e2e-node:
    needs: detect-changes
    if: needs.detect-changes.outputs.code == 'true'
    name: 🖥️ E2E Node self-host
    uses: ./.github/workflows/e2e-node.yml

  ci-status-check:
    needs:
      - detect-changes
      - check
      - build-lint-test
      - consolidated-tests
      - smoke-tests
      - smoke-tests-react-18
      - cli-smoke-tests
      - telemetry-check
      - rsc-smoke-tests
      - ssr-smoke-tests
      - fragments-smoke-tests
      - live-smoke-tests
      - create-cedar-app
      - cli-pm-smoke-tests
      - ud-tests
      - background-jobs-e2e
      - e2e-netlify
      - e2e-vercel
      - e2e-node
    if: always()

    name: ✅ CI Status Check
    runs-on: ubuntu-latest

    steps:
      - name: Evaluate previous job status
        run: |
          if [[ ${{ contains(needs.*.result, 'failure') }} == "true" ]]; then
            echo "❌ One or more required jobs have failed"
            exit 1
          else
            echo "✅ All required jobs have passed or been skipped"
            exit 0
          fi
