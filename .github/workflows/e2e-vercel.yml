name: ▲ E2E - Vercel Deploy

on:
  workflow_call:

jobs:
  e2e-vercel:
    runs-on: ubuntu-latest

    env:
      CEDAR_CI: 1
      CEDAR_VERBOSE_TELEMETRY: 1
      YARN_ENABLE_HARDENED_MODE: 0
      YARN_ENABLE_IMMUTABLE_INSTALLS: false
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout the framework code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up job
        uses: ./.github/actions/set-up-job

      - name: 📋 Set up test project
        run: cp -r __fixtures__/test-project-esm ../cedar-test-app

      - name: 🔗 Link local packages via tarsync
        run: yarn project:tarsync ../cedar-test-app

      - name: 🗄️ Set up Neon database
        working-directory: ../cedar-test-app
        run: |
          rm -rf api/db/migrations
          yarn cedar setup neon

      - name: 🔧 Set up Universal Deploy
        working-directory: ../cedar-test-app
        run: yarn cedar setup deploy universal-deploy

      - name: 🔧 Set up Vercel deploy (UD)
        working-directory: ../cedar-test-app
        run: yarn cedar setup deploy vercel --ud

      - name: 🏗️ Build locally
        working-directory: ../cedar-test-app
        run: |
          DATABASE_URL="$(sed -n 's/^DATABASE_URL=//p' .env)"
          DIRECT_DATABASE_URL="$(sed -n 's/^DIRECT_DATABASE_URL=//p' .env)"
          export DATABASE_URL DIRECT_DATABASE_URL
          yarn cedar build --ud --apiRootPath=/.api/functions
          yarn cedar prisma migrate deploy
          yarn cedar data-migrate up

      - name: 🆕 Create Vercel project
        id: create-project
        run: |
          PROJECT_NAME="cedar-e2e-$(date +%s)"
          RESPONSE=$(curl -s -X POST "https://api.vercel.com/v10/projects" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"$PROJECT_NAME\"}")
          echo "project-id=$(echo "$RESPONSE" | jq -r '.id')" >> "$GITHUB_OUTPUT"
          echo "project-name=$PROJECT_NAME" >> "$GITHUB_OUTPUT"

      - name: 🔗 Link Vercel project
        working-directory: ../cedar-test-app
        run: |
          npx vercel link --project "${{ steps.create-project.outputs.project-name }}" --token "$VERCEL_TOKEN" --yes
          echo "--- .vercel contents ---"
          ls -la .vercel/ 2>/dev/null || echo "No .vercel directory"
          cat .vercel/project.json 2>/dev/null || echo "No project.json"
          echo "--- .vercel/output contents ---"
          ls -la .vercel/output/ 2>/dev/null || echo "No .vercel/output directory"
          ls .vercel/output/functions/ 2>/dev/null || echo "No functions directory"
          cat .vercel/output/config.json 2>/dev/null | head -20 || echo "No config.json"

      - name: 🚀 Deploy to Vercel
        id: vercel-deploy
        working-directory: ../cedar-test-app
        run: |
          OUTPUT=$(npx vercel deploy --prebuilt --prod --json --token "$VERCEL_TOKEN" 2>&1) || EXIT_CODE=$?
          echo "--- deploy output ---"
          echo "$OUTPUT"
          echo "--- end output ---"
          if [ -n "$EXIT_CODE" ] && [ "$EXIT_CODE" -ne 0 ]; then
            exit "$EXIT_CODE"
          fi
          echo "deploy-url=$(echo "$OUTPUT" | jq -r '.url')" >> "$GITHUB_OUTPUT"

      - name: 🧪 Run Vercel e2e tests
        run: yarn vitest run
        working-directory: tasks/vercel-tests
        env:
          VERCEL_DEPLOY_URL: ${{ steps.vercel-deploy.outputs.deploy-url }}
