name: 📄 Fragments Smoke Tests

on:
  workflow_call:
    inputs:
      os:
        required: true
        type: string

jobs:
  fragments-smoke-tests:
    runs-on: ${{ inputs.os }}

    env:
      REDWOOD_CI: 1
      REDWOOD_VERBOSE_TELEMETRY: 1

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set up job
        uses: ./.github/actions/set-up-job

      - name: 🌲 Set up test project
        id: set-up-kitchen-sink
        uses: ./.github/actions/set-up-kitchen-sink
        with:
          canary: false
        env:
          REDWOOD_DISABLE_TELEMETRY: 1
          YARN_ENABLE_IMMUTABLE_INSTALLS: false

      - name: Run Fragments codemods on test project
        run: node ./tasks/test-project/add-gql-fragments.mts ${{ steps.set-up-kitchen-sink.outputs.test-project-path }}
        env:
          REDWOOD_DISABLE_TELEMETRY: 1

      - name: 🎭 Install playwright dependencies
        run: npx playwright install --with-deps chromium

      - name: Run Fragments dev smoke tests
        working-directory: ./tasks/smoke-tests/fragments-dev
        run: npx playwright test
        env:
          CEDAR_TEST_PROJECT_PATH: '${{ steps.set-up-kitchen-sink.outputs.test-project-path }}'
          REDWOOD_DISABLE_TELEMETRY: 1

      - name: Build for production
        working-directory: ${{ steps.set-up-kitchen-sink.outputs.test-project-path }}
        shell: bash
        run: |
          set -o pipefail
          yarn cedar build || {
            echo "::group::package.json diagnostics"
            node $GITHUB_WORKSPACE/.github/scripts/diagnose-package-json.mjs || true
            echo "::endgroup::"
            exit 1
          }
        env:
          REDWOOD_DISABLE_TELEMETRY: 1

      - name: Run Fragments serve smoke tests
        working-directory: ./tasks/smoke-tests/fragments-serve
        run: npx playwright test
        env:
          CEDAR_TEST_PROJECT_PATH: '${{ steps.set-up-kitchen-sink.outputs.test-project-path }}'
          REDWOOD_DISABLE_TELEMETRY: 1

      - name: Enable trusted-documents in Fragments test project
        run: node ./tasks/test-project/set-up-trusted-documents.mts ${{ steps.set-up-kitchen-sink.outputs.test-project-path }}
        env:
          REDWOOD_DISABLE_TELEMETRY: 1

      - name: 📄 Run prerender smoke tests against Fragments test project (with trusted-documents enabled)
        working-directory: tasks/smoke-tests/prerender
        run: npx playwright test
        env:
          CEDAR_TEST_PROJECT_PATH: ${{ steps.set-up-kitchen-sink.outputs.test-project-path }}
          REDWOOD_DISABLE_TELEMETRY: 1
