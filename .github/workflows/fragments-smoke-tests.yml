name: 📄 Fragments Smoke Tests

on:
  workflow_call:
    inputs:
      os:
        required: true
        type: string

jobs:
  fragments-smoke-tests:
    runs-on: ${{ inputs.os }}

    env:
      CEDAR_CI: 1
      CEDAR_VERBOSE_TELEMETRY: 1

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Set up job
        uses: ./.github/actions/set-up-job

      - name: 🌲 Set up test project
        id: set-up-test-project
        uses: ./.github/actions/set-up-test-project
        with:
          canary: false
        env:
          REDWOOD_DISABLE_TELEMETRY: 1
          YARN_ENABLE_IMMUTABLE_INSTALLS: false

      - name: Run Fragments codemods on test project
        run: node ./tasks/test-project/add-gql-fragments.mts ${{ steps.set-up-test-project.outputs.test-project-path }}
        env:
          REDWOOD_DISABLE_TELEMETRY: 1

      - name: 🎭 Install Playwright OS dependencies
        if: runner.os == 'Linux'
        run: npx playwright install-deps chromium

      - name: 🎭 Install playwright dependencies
        run: npx playwright install chromium

      - name: Run Fragments dev smoke tests
        working-directory: ./tasks/smoke-tests/fragments-dev
        run: npx playwright test
        env:
          CEDAR_TEST_PROJECT_PATH: '${{ steps.set-up-test-project.outputs.test-project-path }}'
          REDWOOD_DISABLE_TELEMETRY: 1

      - name: Build for production
        working-directory: ${{ steps.set-up-test-project.outputs.test-project-path }}
        shell: bash
        run: |
          set -o pipefail
          yarn cedar build || {
            echo "::group::package.json diagnostics"
            node $GITHUB_WORKSPACE/.github/scripts/diagnose-package-json.mjs || true
            echo "::endgroup::"
            exit 1
          }
        env:
          REDWOOD_DISABLE_TELEMETRY: 1

      - name: Run Fragments serve smoke tests
        working-directory: ./tasks/smoke-tests/fragments-serve
        run: npx playwright test
        env:
          CEDAR_TEST_PROJECT_PATH: '${{ steps.set-up-test-project.outputs.test-project-path }}'
          REDWOOD_DISABLE_TELEMETRY: 1

      - name: Enable trusted-documents in Fragments test project
        run: node ./tasks/test-project/set-up-trusted-documents.mts ${{ steps.set-up-test-project.outputs.test-project-path }}
        env:
          REDWOOD_DISABLE_TELEMETRY: 1

      - name: 📄 Run prerender smoke tests against Fragments test project (with trusted-documents enabled)
        working-directory: tasks/smoke-tests/prerender
        run: npx playwright test
        env:
          CEDAR_TEST_PROJECT_PATH: ${{ steps.set-up-test-project.outputs.test-project-path }}
          REDWOOD_DISABLE_TELEMETRY: 1
