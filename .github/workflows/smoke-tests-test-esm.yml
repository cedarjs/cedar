name: 🔄 Smoke Tests Test

on:
  workflow_call:
    inputs:
      os:
        required: true
        type: string

jobs:
  smoke-tests:
    runs-on: ${{ inputs.os }}

    env:
      REDWOOD_CI: 1
      REDWOOD_VERBOSE_TELEMETRY: 1

    steps:
      - name: Checkout the framework code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up job
        uses: ./.github/actions/set-up-job

      - name: 🌲 Set up test project
        id: set-up-test-project-esm
        uses: ./.github/actions/set-up-test-project-esm
        env:
          REDWOOD_DISABLE_TELEMETRY: 1
          YARN_ENABLE_IMMUTABLE_INSTALLS: false

      - name: 🎭 Install playwright dependencies
        run: npx playwright install --with-deps chromium

      - name: 🧑‍💻 Run dev smoke tests
        working-directory: ./tasks/smoke-tests/dev
        run: npx playwright test
        env:
          CEDAR_TEST_PROJECT_PATH: '${{ steps.set-up-test-project-esm.outputs.test-project-path }}'
          REDWOOD_DISABLE_TELEMETRY: 1

      - name: 🔐 Run auth smoke tests
        working-directory: ./tasks/smoke-tests/auth
        run: npx playwright test
        env:
          CEDAR_TEST_PROJECT_PATH: ${{ steps.set-up-test-project-esm.outputs.test-project-path }}
          REDWOOD_DISABLE_TELEMETRY: 1

      - name: Run `cedar build --no-prerender`
        shell: bash
        run: |
          set -o pipefail
          yarn cedar build --no-prerender || {
            echo "::group::package.json diagnostics"
            node $GITHUB_WORKSPACE/.github/scripts/diagnose-package-json.mjs || true
            echo "::endgroup::"
            exit 1
          }
        working-directory: ${{ steps.set-up-test-project-esm.outputs.test-project-path }}

      - name: Run `cedar prerender`
        run: |
          yarn cedar prerender --verbose
        working-directory: ${{ steps.set-up-test-project-esm.outputs.test-project-path }}

      - name: Run `cedar test web`
        run: |
          yarn cedar test web --no-watch
        working-directory: ${{ steps.set-up-test-project-esm.outputs.test-project-path }}

      - name: Run `cedar test api`
        run: |
          yarn cedar test api --no-watch
        working-directory: ${{ steps.set-up-test-project-esm.outputs.test-project-path }}

      - name: Run db import tracking tests
        shell: bash
        run: |
          # Only run this for ESM projects where the vitest config file exists
          # Also taking this opportunity to test --load-env-files
          echo "SMOKE_ENV_VAR=smoke-value" > .env.smoke
          if test -f api/vitest-sort.config.ts; then
            yarn cedar test api --no-watch --config api/vitest-sort.config.ts --load-env-files smoke
          fi
        working-directory: ${{ steps.set-up-test-project-esm.outputs.test-project-path }}

      - name: 🖥️ Run serve smoke tests
        working-directory: tasks/smoke-tests/serve
        run: npx playwright test
        env:
          CEDAR_TEST_PROJECT_PATH: ${{ steps.set-up-test-project-esm.outputs.test-project-path }}
          REDWOOD_DISABLE_TELEMETRY: 1

      - name: 📄 Run prerender smoke tests
        working-directory: tasks/smoke-tests/prerender
        run: npx playwright test
        env:
          CEDAR_TEST_PROJECT_PATH: ${{ steps.set-up-test-project-esm.outputs.test-project-path }}
          REDWOOD_DISABLE_TELEMETRY: 1

      - name: 📕 Run Storybook smoke tests
        working-directory: tasks/smoke-tests/storybook
        run: npx playwright test
        env:
          CEDAR_TEST_PROJECT_PATH: ${{ steps.set-up-test-project-esm.outputs.test-project-path }}
          REDWOOD_DISABLE_TELEMETRY: 1
