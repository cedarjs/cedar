name: Background Jobs E2E Test

on:
  workflow_call:
    inputs:
      os:
        required: true
        type: string

jobs:
  background-jobs-e2e:
    runs-on: ${{ inputs.os }}

    env:
      CEDAR_CI: 1
      CEDAR_VERBOSE_TELEMETRY: 1

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Set up job
        uses: ./.github/actions/set-up-job

      - name: 🌲 Set up test project
        id: set-up-test-project
        uses: ./.github/actions/set-up-test-project
        with:
          canary: false
        env:
          REDWOOD_DISABLE_TELEMETRY: 1
          YARN_ENABLE_IMMUTABLE_INSTALLS: false

      - name: Run E2E test script
        run: yarn e2e:background-jobs ${{ steps.set-up-test-project.outputs.test-project-path }}
        env:
          CEDAR_VERBOSE_TELEMETRY: ''
